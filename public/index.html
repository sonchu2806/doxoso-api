<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <!-- API: cùng origin khi host trên Railway; mở file local dùng ?api=https://web-production-d8605.up.railway.app -->
  <meta name="theme-color" content="#F7F7FA" />
  <title>Dò Số</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #F7F7FA;
      color: #303233;
      padding-bottom: 120px;
      -webkit-tap-highlight-color: transparent;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 52px 16px 24px; }
    .title-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .title-row h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; margin: 0; flex: 1; }
    .btn-reset {
      flex-shrink: 0; border: none; background: transparent; color: #2D7FF9;
      font-size: 12px; font-weight: 700; cursor: pointer; padding: 6px 8px; font-family: inherit;
    }
    .btn-reset.hidden { display: none !important; }
    .tabs-row { display: flex; gap: 4px; margin-bottom: 16px; }
    .tab-pill {
      flex: 1; height: 36px; border-radius: 10px; border: 1px solid transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: transparent; color: #B2B7C0;
    }
    .tab-pill.on { background: #fff; border-color: #E5E7EB; color: #303233; }
    .product-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 10px; -webkit-overflow-scrolling: touch; }
    .product-chip {
      flex: 0 0 auto; height: 32px; border-radius: 999px; border: 1px solid #E5E7EB;
      background: #fff; padding: 0 12px; display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; color: #6E7481; cursor: pointer;
    }
    .product-chip.on { border-color: #EB2F98; background: #FDEAF4; color: #EB2F98; font-weight: 700; }
    .product-chip-logo {
      width: 28px; height: 20px; object-fit: contain; flex-shrink: 0;
      mix-blend-mode: multiply; vertical-align: middle;
    }
    .hint { font-size: 11px; color: #B0B5BE; margin-top: 6px; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #E5E7EB; padding: 12px; margin-bottom: 12px; }
    .banner { display: flex; gap: 10px; align-items: center; padding: 12px; border-radius: 12px; border: 1px solid; margin-bottom: 12px; }
    .banner-logo {
      width: 56px; height: 38px; border-radius: 10px; background: transparent;
      display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0;
    }
    .banner-logo img { width: 50px; height: 30px; object-fit: contain; mix-blend-mode: multiply; }
    .banner h2 { margin: 0; font-size: 18px; font-weight: 800; }
    .banner p { margin: 2px 0 0; font-size: 12px; color: #666C76; }
    .tag { display: inline-block; margin-top: 4px; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 8px; }
    .ky-row { display: flex; align-items: center; gap: 8px; min-height: 40px; background: #F2F2F6; border: 1px solid #EBEBEB; border-radius: 8px; padding: 7px 12px; margin-bottom: 12px; cursor: pointer; }
    .ky-row select { flex: 1; border: none; background: transparent; font-size: 15px; color: #303233; font-weight: 600; }
    .keno-sub { display: flex; gap: 6px; margin-bottom: 12px; }
    .keno-sub button {
      flex: 1; height: 30px; border-radius: 20px; border: 1px solid #E5E7EB; background: #F7F7FA;
      font-size: 11px; font-weight: 600; color: #8A8F98; cursor: pointer;
    }
    .keno-sub button.on { background: #FFF3E8; border-color: #F5943A; color: #D5862E; font-weight: 700; }
    .text-opts { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .text-opts span { font-size: 12px; font-weight: 700; color: #6D7380; width: 100%; margin-bottom: 4px; }
    .opt { min-height: 34px; border-radius: 17px; border: 1px solid #E1E5ED; background: #F7F8FC; padding: 0 12px; font-size: 12px; font-weight: 600; color: #626A77; cursor: pointer; }
    .opt.on { border-color: #F5943A; background: #FFF1E3; color: #D5862E; font-weight: 700; }
    .grid-pick { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 8px 0; }
    .lotto535-pick-wrap {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
    }
    .lotto535-pick-wrap > .grid-pick {
      justify-content: center;
      width: 100%;
    }
    .cell {
      width: 38px; height: 38px; border-radius: 19px; border: 1px solid #C9CED8; background: #F5F6FA;
      display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: #565D69; cursor: pointer;
    }
    .cell.sel { border-color: #EB2F98; background: #FDEAF4; font-weight: 700; }
    .cell.dis { opacity: 0.45; pointer-events: none; }
    .cell.spec-sel { border-color: #F2BD00; background: #FFF4CE; }
    .slot-row { display: flex; gap: 8px; justify-content: center; margin: 12px 0; }
    .slot-row input {
      width: 44px; height: 44px; border: 1px solid #EBEBEB; border-radius: 8px; text-align: center; font-size: 18px; font-weight: 700;
    }
    .pro-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 12px 0; }
    .btn-check {
      width: 100%; height: 44px; border-radius: 14px; border: none; color: #fff; font-weight: 700; font-size: 20px;
      margin: 12px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-check:disabled { opacity: 0.6; }
    .region-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .region-row button { flex: 1; height: 32px; border-radius: 16px; border: 1px solid #D8DEE8; background: #F7F8FC; font-size: 12px; font-weight: 600; color: #5D6470; cursor: pointer; }
    .region-row button.on { border-color: #EB2F98; background: #FDEAF4; color: #EB2F98; font-weight: 700; }
    .dai-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .dai-wrap button { height: 32px; border-radius: 16px; border: 1px solid #D8DEE8; background: #F7F8FC; padding: 0 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .dai-wrap button.on { border-color: #2D7FF9; background: #EAF2FF; color: #2D7FF9; font-weight: 700; }
    .ticket-box {
      height: 58px; border-radius: 10px; border: 1px solid #D9DDE5; background: #F7F7FA;
      display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px;
    }
    .ticket-box.ticket-box-visible { padding: 0 10px; }
    .xskt-ticket-visible {
      flex: 1; width: 100%; min-height: 44px; border: none; background: transparent;
      text-align: center; font-size: 22px; font-weight: 700; letter-spacing: 0.28em;
      font-variant-numeric: tabular-nums; outline: none; color: #303233;
      -webkit-appearance: none; appearance: none;
    }
    .xskt-ticket-visible::placeholder { color: #C9CED8; letter-spacing: 0.28em; }
    .momo-consent {
      margin: 14px 0 0;
      font-size: 12px;
      line-height: 1.5;
      color: #7D848F;
    }
    .bottom-nav {
      position: fixed; left: 0; right: 0; bottom: 0; height: 106px; background: #fff; border-top: 1px solid #E5E7EB;
      display: flex; align-items: flex-start; justify-content: center; padding-top: 10px; z-index: 120;
    }
    .bottom-inner { width: 100%; max-width: 760px; display: flex; position: relative; padding-bottom: env(safe-area-inset-bottom, 0px); }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 14px; cursor: pointer; position: relative; }
    .nav-item .ico-img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 4px; display: block; }
    .nav-item .lbl { font-size: 11px; text-align: center; font-weight: 600; color: #8A8F98; line-height: 14px; }
    .nav-item.on .lbl { color: #EB2F98 !important; font-weight: 700; }
    .nav-item.on .bar { width: 40px; height: 3px; border-radius: 2px; background: #EB2F98; position: absolute; top: 8px; left: 50%; margin-left: -20px; }
    .nav-scan { width: 168px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 10px; cursor: pointer; }
    .nav-scan .scan-img { width: 72px; height: 72px; object-fit: contain; margin-top: -32px; display: block; }
    .nav-scan .pill { margin-top: 4px; background: #EB2F98; border-radius: 999px; padding: 4px 12px; color: #fff; font-size: 10px; font-weight: 700; }
    .nav-scan.on .pill { box-shadow: 0 0 0 2px #EB2F98, 0 0 0 4px #fff; }
    .result { margin-top: 12px; background: #fff; border-radius: 12px; border: 1px solid #E8EAF0; padding: 12px; }
    .result h3 { margin: 0; font-size: 15px; font-weight: 800; }
    .toast { position: fixed; top: 12px; left: 12px; right: 12px; background: #303233; color: #fff; padding: 12px; border-radius: 10px; font-size: 14px; z-index: 100; display: none; }
    .saved-card { border-radius: 14px; border: 1px solid #E6DCE0; padding: 12px 12px 12px 14px; margin-bottom: 10px; position: relative; background: #FCFCFE; }
    .saved-card.win { border-color: #BEE8CF; background: #F2FFF7; }
    .saved-card .stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 14px 0 0 14px; background: #6C63FF; }
    .saved-card.win .stripe { background: #34C759; }
    .date-grp { color: #6F7682; font-weight: 700; margin: 12px 0 8px; font-size: 14px; }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: sp 0.7s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .win-fx {
      position: fixed; left: 0; right: 0; top: 0; bottom: 106px;
      pointer-events: none; z-index: 60; overflow: hidden;
    }
    .win-fx.hidden { display: none !important; }
    .win-fx-particle {
      position: absolute; width: 8px; height: 8px; border-radius: 50%;
      left: 50%; top: 26%; margin-left: -4px; opacity: 0;
      animation: winfx-burst 1.45s ease-out forwards;
    }
    @keyframes winfx-burst {
      0% { opacity: 1; transform: translate(0, 0) scale(0.25); }
      12% { opacity: 1; }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.05); }
    }
    .hidden { display: none !important; }
    .sel-hint { font-size: 12px; font-weight: 600; margin-top: 4px; color: #A16B00; }
    .sel-hint.ok { color: #24A972; }
    .saved-swipe-outer { position: relative; margin-bottom: 10px; border-radius: 14px; overflow: hidden; }
    .saved-swipe-delete {
      position: absolute; right: 0; top: 0; bottom: 0; width: 76px; z-index: 0;
      display: flex; align-items: center; justify-content: center;
      background: #FFEEF0; border: 1px solid #FFD7DE; border-radius: 14px;
    }
    .saved-swipe-delete .btn-saved-del {
      border: none; background: #D64545; color: #fff; font-weight: 700; font-size: 13px;
      padding: 8px 14px; border-radius: 10px; cursor: pointer;
    }
    .saved-swipe-front {
      position: relative; z-index: 1; transition: transform 0.18s ease-out;
      will-change: transform;
    }
    .saved-swipe-front .saved-card { margin-bottom: 0; }
    .scan-camera {
      position: fixed; inset: 0; z-index: 130; background: #000;
      display: none; flex-direction: column; overflow: hidden;
    }
    .scan-camera.open { display: flex; }
    .scan-camera video {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; background: #111;
    }
    .scan-camera-ui {
      position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column;
      pointer-events: none;
    }
    .scan-camera-ui > * { pointer-events: auto; }
    .scan-camera-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: calc(12px + env(safe-area-inset-top, 0)) 16px 8px;
    }
    .scan-camera-icon-btn {
      width: 44px; height: 44px; border: none; border-radius: 50%;
      background: rgba(0,0,0,0.35); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .scan-camera-icon-btn.on { background: rgba(255,255,255,0.25); }
    .scan-camera-icon-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .scan-camera-center {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 0 24px;
    }
    .scan-camera-frame {
      width: min(92vw, 340px); aspect-ratio: 1.45 / 1;
      border: 2px solid rgba(255,255,255,0.92); border-radius: 14px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
      pointer-events: none;
    }
    .scan-camera-hint {
      margin: 18px 0 0; max-width: 300px; text-align: center;
      color: #fff; font-size: 13px; line-height: 1.45; font-weight: 500;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }
    .scan-camera-bottom {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 28px calc(20px + env(safe-area-inset-bottom, 0));
    }
    .scan-camera-shutter {
      width: 72px; height: 72px; border-radius: 50%; border: 4px solid #fff;
      background: transparent; cursor: pointer; flex-shrink: 0;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.35);
      -webkit-tap-highlight-color: transparent;
    }
    .scan-camera-shutter:active { transform: scale(0.94); }
    .scan-camera-shutter:disabled { opacity: 0.45; }
    .scan-camera-gallery-thumb {
      width: 44px; height: 44px; border-radius: 8px; border: 2px solid #fff;
      background: rgba(255,255,255,0.15);
      cursor: pointer; overflow: hidden; padding: 0;
      display: flex; align-items: center; justify-content: center; color: #fff;
    }
    .scan-camera-gallery-thumb svg { width: 26px; height: 26px; fill: currentColor; opacity: 0.95; }
    .scan-camera-busy {
      position: absolute; inset: 0; z-index: 5; background: rgba(0,0,0,0.72);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; text-align: center; padding: 24px;
    }
    .scan-camera-busy.show { display: flex; }
    .scan-camera-busy p { margin: 8px 0 0; font-size: 14px; }
    .scan-camera-busy .scan-busy-title { font-weight: 700; font-size: 16px; margin: 0; }
    .scan-result-box {
      display: none; margin-top: 12px; max-width: 320px; width: 100%;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px; padding: 12px; color: #fff; font-size: 13px; line-height: 1.5;
    }
    .scan-result-box.show { display: block; }
    .scan-result-box strong { color: #ffb8e0; }
    .scan-preview { display: none; }
    #scan-file-gallery {
      position: fixed; left: -9999px; width: 1px; height: 1px; opacity: 0;
    }
  </style>
</head>
<body>
  <!-- scan-file-camera removed: inline getUserMedia camera -->
  <input type="file" id="scan-file-gallery" accept="image/*" />
  <div class="scan-camera" id="scan-camera" aria-hidden="true">
    <video id="scan-camera-video" playsinline autoplay muted></video>
    <div class="scan-camera-busy" id="scan-camera-busy" aria-live="polite">
      <p class="scan-busy-title">Đang đọc vé…</p>
      <p>Có thể mất 5–15 giây</p>
      <div id="scan-result-box" class="scan-result-box"></div>
    </div>
    <div class="scan-camera-ui">
      <div class="scan-camera-top">
        <button type="button" class="scan-camera-icon-btn" id="scan-camera-close" aria-label="Đóng">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
        <button type="button" class="scan-camera-icon-btn" id="scan-camera-flash" aria-label="Đèn flash">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
        </button>
      </div>
      <div class="scan-camera-center">
        <div class="scan-camera-frame" aria-hidden="true"></div>
        <p class="scan-camera-hint">Di chuyển camera đến gần vé để quét nhanh hơn</p>
      </div>
      <div class="scan-camera-bottom">
        <button type="button" class="scan-camera-gallery-thumb" id="scan-camera-gallery" aria-label="Chọn ảnh từ thư viện">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        </button>
        <button type="button" class="scan-camera-shutter" id="scan-camera-shutter" aria-label="Chụp vé"></button>
        <button type="button" class="scan-camera-icon-btn" id="scan-camera-flip" aria-label="Đổi camera">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 5h-3.17L15 3H9L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-8 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.65 0-3 1.35-3 3s1.35 3 3 3 3-1.35 3-3-1.35-3-3-3zM5 7h1.83l1-1h6.34l1 1H19v2H5V7z"/></svg>
        </button>
      </div>
    </div>
  </div>
  <img id="scan-preview" class="scan-preview" alt="" />
  <div class="toast" id="toast"></div>

  <div id="win-fx" class="win-fx hidden" aria-hidden="true"></div>
  <div class="wrap" id="main-scroll">
    <div class="title-row">
      <h1>Dò Số</h1>
      <button type="button" class="btn-reset hidden" id="btn-reset">Đặt lại</button>
    </div>
    <div class="tabs-row">
      <button type="button" class="tab-pill on" data-tab="do">Dò số</button>
      <button type="button" class="tab-pill" data-tab="luu">Lịch sử dò</button>
    </div>
    <div id="panel-do"></div>
    <div id="panel-luu" class="hidden"></div>
  </div>
  <div class="bottom-nav">
    <div class="bottom-inner">
      <div class="nav-item on" data-channel="xskt" id="nav-xskt">
        <span class="bar" id="bar-xskt"></span>
        <img src="/assets/tab-xskt.png" alt="" class="ico-img" width="40" height="40" />
        <span class="lbl">Xổ số<br/>kiến thiết</span>
      </div>
      <div class="nav-scan" id="nav-scan">
        <img src="/assets/tab-scan.png" alt="" class="scan-img" width="72" height="72" />
        <span class="pill">Scan vé số</span>
      </div>
      <div class="nav-item" data-channel="vietlott" id="nav-vl">
        <span class="bar hidden" id="bar-vl"></span>
        <img src="/assets/tab-vietlott.png" alt="" class="ico-img" width="40" height="40" />
        <span class="lbl" style="font-size:12px">Vietlott</span>
      </div>
    </div>
  </div>
  <noscript><p style="padding:16px">Bật JavaScript để dò số.</p></noscript>
  <script src="/web-app.js" defer></script>
</body>
</html>
